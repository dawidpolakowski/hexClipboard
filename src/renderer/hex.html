<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>hexClipboard — Hex Grid</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1a2e; --bg2: #16213e; --bg3: #0f3460;
    --purple: #7f77dd; --purple-light: #afa9ec; --purple-dim: #2d2a5e;
    --text: #e8e6f8; --text2: #9895c0; --text3: #5c5a80;
    --border: rgba(127,119,221,0.2);
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .topbar { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .logo { font-size: 16px; font-weight: 700; color: var(--purple-light); letter-spacing: -0.3px; }
  .logo span { opacity: 0.5; }
  #search { flex: 1; max-width: 300px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; color: var(--text); font-size: 13px; outline: none; }
  #search:focus { border-color: rgba(127,119,221,0.5); }
  .filter-tabs { display: flex; gap: 4px; margin-left: auto; }
  .tab { font-size: 11px; padding: 4px 10px; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; color: var(--text2); background: none; }
  .tab.active { background: var(--purple-dim); color: var(--purple-light); }
  #count { font-size: 12px; color: var(--text3); }
  .canvas-wrap { flex: 1; overflow: auto; padding: 20px; }
  .hex-grid { display: flex; flex-wrap: wrap; gap: 6px; align-content: flex-start; }
  .hex-cell { position: relative; cursor: pointer; }
  .hex-cell svg { display: block; }
  .hex-cell:hover .hex-bg { fill: #3C3489; }
  .hex-cell.pinned .hex-bg { fill: rgba(186,117,23,0.3); }
  .hex-cell.pinned:hover .hex-bg { fill: rgba(186,117,23,0.5); }
  .hex-cell.active .hex-bg { fill: var(--purple-dim); stroke: var(--purple) !important; stroke-width: 2 !important; }
  .hex-cell svg text { pointer-events: none; }
  .detail { flex-shrink: 0; width: 280px; border-left: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .detail-empty { color: var(--text3); font-size: 13px; margin: auto; text-align: center; }
  .detail-type { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--purple); }
  .detail-text { font-size: 13px; line-height: 1.65; color: var(--text); word-break: break-word; white-space: pre-wrap; max-height: 320px; overflow-y: auto; background: var(--bg2); border-radius: 6px; padding: 10px 12px; border: 1px solid var(--border); }
  .detail-meta { font-size: 11px; color: var(--text3); }
  .detail-actions { display: flex; gap: 6px; margin-top: auto; }
  .btn { font-size: 12px; padding: 7px 14px; border-radius: 7px; border: 1px solid var(--border); cursor: pointer; background: none; color: var(--text2); transition: background 0.1s; }
  .btn:hover { background: var(--bg2); color: var(--text); }
  .btn-primary { background: var(--purple-dim); color: var(--purple-light); border-color: rgba(127,119,221,0.4); }
  .btn-primary:hover { background: #3C3489; }
  .main-area { display: flex; flex: 1; overflow: hidden; }
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">hex<span>Clipboard</span></div>
  <input type="text" id="search" placeholder="Search…" autocomplete="off" spellcheck="false"/>
  <div class="filter-tabs">
    <button class="tab active" data-tab="all">All</button>
    <button class="tab" data-tab="text">Text</button>
    <button class="tab" data-tab="link">Links</button>
    <button class="tab" data-tab="code">Code</button>
    <button class="tab" data-tab="pinned">Pinned</button>
  </div>
  <span id="count"></span>
</div>
<div class="main-area">
  <div class="canvas-wrap">
    <div class="hex-grid" id="grid"></div>
  </div>
  <div class="detail" id="detail">
    <div class="detail-empty">Select a hex cell<br>to preview</div>
  </div>
</div>
<script>
  let history = []
  let activeTab = 'all'
  let selectedId = null
  const W = 90, H = 80

  function hexPoints(cx, cy, r) {
    return Array.from({length:6},(_,i)=>{
      const a = Math.PI/180*(60*i-30)
      return `${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`
    }).join(' ')
  }

  function truncate(s, n=28) { s=s.replace(/\n/g,' '); return s.length>n?s.slice(0,n)+'…':s }
  function relTime(ts) {
    const s=Math.floor((Date.now()-ts)/1000)
    if(s<60) return 'just now'
    if(s<3600) return Math.floor(s/60)+'m ago'
    if(s<86400) return Math.floor(s/3600)+'h ago'
    return Math.floor(s/86400)+'d ago'
  }
  function typeColor(t) {
    if(t==='link') return '#185FA5'
    if(t==='code') return '#3B6D11'
    return '#3C3489'
  }

  function render() {
    const q = document.getElementById('search').value.toLowerCase()
    let items = history.filter(h => {
      if(activeTab==='pinned') return h.pinned
      if(activeTab!=='all'&&h.type!==activeTab) return false
      return !q||h.text.toLowerCase().includes(q)
    })
    document.getElementById('count').textContent = items.length + ' items'

    const grid = document.getElementById('grid')
    grid.innerHTML = items.map(item => {
      const lines = truncate(item.text,22).match(/.{1,12}/g)||['']
      const isActive = item.id===selectedId
      const cx=W/2, cy=H/2, r=36
      let textRows = ''
      lines.slice(0,3).forEach((l,i)=>{
        textRows+=`<text x="${cx}" y="${cy-8+(i*14)}" text-anchor="middle" font-size="9" fill="#afa9ec" font-family="monospace">${l.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</text>`
      })
      return `<div class="hex-cell${item.pinned?' pinned':''}${isActive?' active':''}" data-id="${item.id}">
        <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
          <polygon class="hex-bg" points="${hexPoints(cx,cy,r)}" fill="${typeColor(item.type)}" stroke="rgba(127,119,221,0.3)" stroke-width="1"/>
          ${textRows}
        </svg>
      </div>`
    }).join('')
  }

  function showDetail(id) {
    const item = history.find(h=>h.id===id)
    const detail = document.getElementById('detail')
    if(!item){detail.innerHTML='<div class="detail-empty">Select a hex cell<br>to preview</div>';return}
    detail.innerHTML=`
      <div class="detail-type">${item.type}${item.pinned?' · pinned':''}</div>
      <div class="detail-text">${item.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>
      <div class="detail-meta">${relTime(item.time)} · ${item.text.length} chars</div>
      <div class="detail-actions">
        <button class="btn btn-primary" id="d-copy">Copy</button>
        <button class="btn" id="d-pin">${item.pinned?'Unpin':'Pin'}</button>
        <button class="btn" id="d-del">Delete</button>
      </div>
    `
    document.getElementById('d-copy').onclick=async()=>{ await window.hexClip.copyItem(id) }
    document.getElementById('d-pin').onclick=async()=>{ history=await window.hexClip.pinItem(id); render(); showDetail(id) }
    document.getElementById('d-del').onclick=async()=>{ history=await window.hexClip.deleteItem(id); selectedId=null; render(); detail.innerHTML='<div class="detail-empty">Select a hex cell<br>to preview</div>' }
  }

  document.getElementById('grid').addEventListener('click', e=>{
    const cell=e.target.closest('[data-id]')
    if(cell){ selectedId=parseInt(cell.dataset.id); render(); showDetail(selectedId) }
  })

  document.getElementById('search').addEventListener('input', render)

  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'))
      t.classList.add('active'); activeTab=t.dataset.tab; render()
    })
  })

  async function load() { history=await window.hexClip.getHistory(); render() }
  window.hexClip.onRefresh(data=>{history=data;render()})
  load()
</script>
</body>
</html>
