<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;" />
  <title>Note</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="dark note-window">
  <div class="sticky">
    <div class="sticky-bar">
      <span id="stickyTitle" class="sticky-title">Note</span>
      <div class="sticky-actions">
        <button id="dockLeft" class="sticky-btn" title="Dock to left edge">‹</button>
        <button id="dockRight" class="sticky-btn" title="Dock to right edge">›</button>
        <button id="lock" class="sticky-btn" title="Lock (read-only, pinned on top)">🔓</button>
        <button id="copy" class="sticky-btn" title="Copy note">⧉</button>
        <button id="hide" class="sticky-btn sticky-btn-close" title="Close">✕</button>
      </div>
    </div>
    <div id="stickyContent" class="sticky-content"></div>
  </div>
  <script src="./note.js"></script>
</body>
</html>
