<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;" />
  <title>Note</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="dark note-window">
  <div class="note-win">
    <input id="noteTitle" class="note-title-input" placeholder="Title" spellcheck="false" />
    <textarea id="noteBody" class="note-body-input" placeholder="Write your note… (plain text)" spellcheck="false"></textarea>
    <div class="note-win-foot"><span id="noteMeta" class="note-editor-meta"></span></div>
  </div>
  <script src="./note.js"></script>
</body>
</html>
