<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hexClipboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1c1c1c; --bg2: #252525; --bg3: #2e2e2e;
    --yellow: #f5c518; --yellow-light: #ffd85c; --yellow-dim: #332b00;
    --text: #f0f0f0; --text2: #aaaaaa; --text3: #666666;
    --border: rgba(245,197,24,0.2); --radius: 8px;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none; }
  .titlebar { display: flex; align-items: center; gap: 8px; padding: 10px 12px 8px; border-bottom: 1px solid var(--border); -webkit-app-region: drag; }
  .hex-logo { width: 20px; height: 20px; }
  .titlebar-name { font-size: 13px; font-weight: 600; color: var(--yellow-light); letter-spacing: -0.2px; }
  .private-badge { margin-left: auto; font-size: 10px; background: rgba(218,82,30,0.2); color: #f09595; padding: 2px 7px; border-radius: 10px; display: none; }
  .private-badge.on { display: inline; }
  .search-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-bottom: 1px solid var(--border); -webkit-app-region: no-drag; }
  .search-row svg { flex-shrink: 0; opacity: 0.4; }
  #search { flex: 1; background: none; border: none; outline: none; font-size: 13px; color: var(--text); }
  #search::placeholder { color: var(--text3); }
  .tabs { display: flex; gap: 4px; padding: 6px 10px; border-bottom: 1px solid var(--border); }
  .tab { font-size: 11px; padding: 3px 9px; border-radius: 12px; border: 1px solid transparent; cursor: pointer; color: var(--text2); background: none; transition: all 0.12s; }
  .tab.active { background: var(--yellow-dim); color: var(--yellow-light); border-color: var(--border); }
  .list { flex: 1; overflow-y: auto; padding: 4px; }
  .list::-webkit-scrollbar { width: 4px; }
  .list::-webkit-scrollbar-track { background: transparent; }
  .list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .section-label { font-size: 10px; color: var(--text3); padding: 6px 8px 2px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: var(--radius); cursor: pointer; border: 1px solid transparent; transition: background 0.1s; margin-bottom: 1px; }
  .item:hover { background: var(--bg2); border-color: var(--border); }
  .item.active { background: var(--yellow-dim); border-color: rgba(245,197,24,0.4); }
  .item-icon { font-size: 13px; opacity: 0.6; flex-shrink: 0; width: 16px; text-align: center; }
  .item.active .item-icon { opacity: 1; }
  .item-body { flex: 1; min-width: 0; }
  .item-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); font-size: 12px; line-height: 1.4; }
  .item.active .item-text { color: var(--yellow-light); }
  .item-meta { font-size: 10px; color: var(--text3); margin-top: 1px; }
  .item-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.12s; flex-shrink: 0; }
  .item:hover .item-actions { opacity: 1; }
  .act-btn { background: none; border: 1px solid var(--border); border-radius: 5px; padding: 2px 5px; cursor: pointer; font-size: 11px; color: var(--text2); transition: background 0.1s; }
  .act-btn:hover { background: var(--bg3); color: var(--text); }
  .act-btn.pinned { color: #ef9f27; border-color: rgba(239,159,39,0.3); }
  .pin-pill { font-size: 9px; background: rgba(239,159,39,0.15); color: #ef9f27; padding: 1px 5px; border-radius: 8px; margin-left: 3px; }
  .statusbar { display: flex; align-items: center; justify-content: space-between; padding: 5px 10px; border-top: 1px solid var(--border); }
  .statusbar span { font-size: 10px; color: var(--text3); }
  .hex-btn { font-size: 10px; color: var(--yellow); background: none; border: 1px solid var(--border); border-radius: 5px; padding: 2px 7px; cursor: pointer; }
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 12px; }
  .empty-icon { font-size: 28px; display: block; margin-bottom: 8px; opacity: 0.3; }
  .badge { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 8px; margin-right: 3px; }
  .badge-link { background: rgba(55,138,221,0.15); color: #85b7eb; }
  .badge-code { background: rgba(99,153,34,0.15); color: #97c459; }
  .badge-text { background: rgba(245,197,24,0.1); color: var(--text3); }
</style>
</head>
<body>
<div class="titlebar">
  <svg class="hex-logo" viewBox="0 0 20 20" fill="none">
    <polygon points="10,1 18,5.5 18,14.5 10,19 2,14.5 2,5.5" stroke="#f5c518" stroke-width="1.5" fill="rgba(245,197,24,0.15)"/>
    <text x="10" y="13.5" text-anchor="middle" font-size="7" font-weight="700" fill="#ffd85c" font-family="monospace">HX</text>
  </svg>
  <span class="titlebar-name">hexClipboard</span>
  <span class="private-badge" id="private-badge">● private</span>
</div>
<div class="search-row">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input type="text" id="search" placeholder="Search clipboard…" autocomplete="off" spellcheck="false"/>
</div>
<div class="tabs">
  <button class="tab active" data-tab="all">All</button>
  <button class="tab" data-tab="text">Text</button>
  <button class="tab" data-tab="link">Links</button>
  <button class="tab" data-tab="code">Code</button>
  <button class="tab" data-tab="pinned">Pinned</button>
</div>
<div class="list" id="list"></div>
<div class="statusbar">
  <span id="count">0 items</span>
  <button class="hex-btn" id="hex-btn">⬡ Hex view</button>
</div>
<script>
  let history = []
  let activeTab = 'all'
  let activeId = null

  function relTime(ts) {
    const s = Math.floor((Date.now() - ts) / 1000)
    if (s < 60) return 'just now'
    if (s < 3600) return Math.floor(s/60) + 'm ago'
    if (s < 86400) return Math.floor(s/3600) + 'h ago'
    return Math.floor(s/86400) + 'd ago'
  }

  function typeIcon(t) {
    if (t === 'link') return '🔗'
    if (t === 'code') return '⌥'
    return '⌨'
  }

  function typeBadge(t) {
    return `<span class="badge badge-${t}">${t}</span>`
  }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

  function render() {
    const q = document.getElementById('search').value.toLowerCase()
    let items = history.filter(h => {
      if (activeTab === 'pinned') return h.pinned
      if (activeTab !== 'all' && h.type !== activeTab) return false
      return !q || h.text.toLowerCase().includes(q)
    })

    const list = document.getElementById('list')
    if (!items.length) {
      list.innerHTML = '<div class="empty"><span class="empty-icon">⬡</span>Nothing here yet</div>'
      document.getElementById('count').textContent = '0 items'
      return
    }

    const pinned = items.filter(i => i.pinned)
    const unpinned = items.filter(i => !i.pinned)
    let html = ''

    if (pinned.length && activeTab !== 'pinned') {
      html += '<div class="section-label">Pinned</div>'
      pinned.forEach(i => html += itemHTML(i))
      if (unpinned.length) html += '<div class="section-label" style="margin-top:4px">Recent</div>'
    }
    unpinned.forEach(i => html += itemHTML(i))
    list.innerHTML = html
    document.getElementById('count').textContent = items.length + ' item' + (items.length !== 1 ? 's' : '')
  }

  function itemHTML(i) {
    const isActive = i.id === activeId
    const preview = i.text.replace(/\n/g,' ').slice(0,100)
    return `<div class="item${isActive?' active':''}" data-id="${i.id}">
      <span class="item-icon">${typeIcon(i.type)}</span>
      <div class="item-body">
        <div class="item-text">${typeBadge(i.type)}${esc(preview)}${i.pinned&&activeTab!=='pinned'?'<span class="pin-pill">pinned</span>':''}</div>
        <div class="item-meta">${relTime(i.time)}</div>
      </div>
      <div class="item-actions">
        <button class="act-btn${i.pinned?' pinned':''}" data-action="pin" data-id="${i.id}" title="${i.pinned?'Unpin':'Pin'}">📌</button>
        <button class="act-btn" data-action="del" data-id="${i.id}" title="Delete">✕</button>
      </div>
    </div>`
  }

  async function load() {
    history = await window.hexClip.getHistory()
    if (!activeId && history.length) activeId = history[0].id
    render()
  }

  document.getElementById('list').addEventListener('click', async (e) => {
    const btn = e.target.closest('[data-action]')
    if (btn) {
      const id = parseInt(btn.dataset.id)
      if (btn.dataset.action === 'pin') { history = await window.hexClip.pinItem(id); render() }
      if (btn.dataset.action === 'del') { history = await window.hexClip.deleteItem(id); render() }
      return
    }
    const item = e.target.closest('[data-id]')
    if (item) {
      const id = parseInt(item.dataset.id)
      await window.hexClip.copyItem(id)
      activeId = id
      render()
      setTimeout(() => window.hexClip.hidePicker(), 120)
    }
  })

  document.getElementById('search').addEventListener('input', render)

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'))
      t.classList.add('active')
      activeTab = t.dataset.tab
      render()
    })
  })

  document.getElementById('hex-btn').addEventListener('click', () => {
    window.hexClip.hidePicker()
  })

  window.hexClip.onRefresh(data => { history = data; render() })

  load()
</script>
</body>
</html>
